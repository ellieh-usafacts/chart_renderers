<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LangSmith Chart Renderer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <script>
    var lastHtml = null;

    window.addEventListener('message', function (event) {
      var msg = event.data;
      if (!msg || msg.type !== 'output') return;

      var html = (msg.data || {}).chart_html;
      if (!html || html === lastHtml) return;
      lastHtml = html;

      var existing = document.querySelector('iframe');
      if (existing) {
        existing.srcdoc = html;
      } else {
        var iframe = document.createElement('iframe');
        iframe.srcdoc = html;
        document.body.appendChild(iframe);
      }
    });
  </script>
</body>
</html>
